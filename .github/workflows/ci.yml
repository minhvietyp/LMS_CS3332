name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: lms_test
          POSTGRES_USER: lms_user
          POSTGRES_PASSWORD: lms_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lms_user -d lms_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: be
    env:
      DATABASE_URL: postgresql://lms_user:lms_password@localhost:5432/lms_test?schema=public
      JWT_ACCESS_SECRET: ci-only-access-secret
      NODE_ENV: test
      CORS_ORIGINS: http://localhost:5173
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: be/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Lint backend
        run: npm run lint

      - name: Test backend
        run: npm test

      - name: Build backend
        run: npm run build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fe
    env:
      VITE_API_BASE_URL: /api/v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: fe/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Test frontend
        run: npm test

      - name: Build frontend
        run: npm run build
